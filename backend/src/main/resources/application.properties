spring.application.name=StudentQuizz

spring.datasource.url=jdbc:h2:file:./data/studentquizz;DB_CLOSE_DELAY=-1;MODE=MySQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.generate-unique-name=false

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

server.port=8080

jwt.secret=${JWT_SECRET:studentquizz-dev-secret-key-must-be-at-least-256-bits-long}
jwt.expiration=86400000

logging.level.com.studentquizz=INFO
logging.level.org.springframework.security=WARN

gemini.api.key=${GEMINI_API_KEY:}
