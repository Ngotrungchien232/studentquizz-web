# ─── Server Port (Render sets PORT env var) ───────────────────────────────────
server.port=${PORT:8080}

# ─── Database (PostgreSQL on Render) ──────────────────────────────────────────
# Render cung cấp DATABASE_URL dạng: postgres://user:pass@host/db
# Spring Boot cần: jdbc:postgresql://host/db?user=...&password=...
# Dùng spring.datasource.url để override
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ─── Encoding UTF-8 ───────────────────────────────────────────────────────────
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ─── File upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ─── Secrets ──────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:studentquizz-prod-secret-key-must-be-at-least-256-bits-long-security}
gemini.api.key=${GEMINI_API_KEY:}

app.dev.seed-endpoint=false

# ─── Cloudinary - lưu trữ ảnh đám mây ────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dqy5ubmde}
